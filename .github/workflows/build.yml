name: Build Custom Images

on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: "05 10 * * 1,4"
  push:
    branches:
      - main
    paths-ignore:
      - "**/README.md"
  workflow_dispatch:

env:
  IMAGE_DESC: "Bazzite with Tuxedo drivers (TCC + kmod) for Tuxedo/Clevo laptops"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  generate-matrix:
    name: Generate Build Matrix
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Find Containerfiles and create matrix
        id: set-matrix
        run: |
          files=$(find Containerfiles -type f -name Containerfile)
          echo "Found containerfiles:"
          echo "$files"

          matrix_entries="[]"
          while IFS= read -r file; do
            relative=${file#Containerfiles/}
            dir=$(dirname "$relative")
            IFS='/' read -r -a parts <<< "$dir"
            
            if [ ${#parts[@]} -eq 2 ]; then
              base="${parts[0]}"
              variant="${parts[1]}"
              case "$variant" in
                "dx")
                  image_name="tuxedo-${base}"
                  ;;
                "blackdx")
                  image_name="tuxedo-${base}-black"
                  ;;
                "nodrivers")
                  image_name="${base}-custom"
                  ;;
                *)
                  image_name="tuxedo-${base}-${variant}"
                  ;;
              esac
            else
              joined=$(IFS=-; echo "${parts[*]}")
              image_name="tuxedo-${joined}"
            fi
            
            entry=$(jq -n --arg ctx "." --arg file "$file" --arg name "$image_name" '{context: $ctx, containerfile: $file, image_name: $name}')
            matrix_entries=$(echo "$matrix_entries" | jq --argjson entry "$entry" '. + [$entry]')
          done <<< "$files"

          echo "Matrix is:"
          echo "$matrix_entries"
          if [ "$matrix_entries" = "[]" ]; then
            echo "No Containerfiles found. Exiting."
            exit 1
          fi
          echo "matrix<<EOF" >> $GITHUB_OUTPUT
          echo "$matrix_entries" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        shell: bash

  build_push:
    name: Build and push images
    needs: generate-matrix
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
      fail-fast: false
      max-parallel: 1
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Free Disk Space (Ubuntu)
        uses: ublue-os/remove-unwanted-software@v8

      - name: Get current date
        id: date
        run: |
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Image Metadata
        uses: docker/metadata-action@v5
        id: metadata
        with:
          tags: |
            type=raw,value=latest
            type=raw,value=latest.{{date 'YYYYMMDD'}}
            type=raw,value={{date 'YYYYMMDD'}}
          labels: |
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
            org.opencontainers.image.description=${{ env.IMAGE_DESC }}
            org.opencontainers.image.title=${{ matrix.image_name }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=latest
            containers.bootc=1
          sep-tags: " "
          sep-annotations: " "

      - name: Build Image
        id: build_image
        uses: redhat-actions/buildah-build@v2
        with:
          context: ${{ matrix.context }}
          containerfiles: ${{ matrix.containerfile }}
          image: ${{ matrix.image_name }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          oci: false
          extra-args: |
            --build-arg=AKMODS_PRIVATE_KEY_B64=${{ secrets.AKMODS_PRIVATE_KEY_B64 }}
            --build-arg=AKMODS_PUBLIC_KEY_B64=${{ secrets.AKMODS_PUBLIC_KEY_B64 }}

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase Registry
        id: registry_case
        uses: ASzc/change-string-case-action@v6
        with:
          string: ${{ env.IMAGE_REGISTRY }}

      - name: Lowercase Image
        id: image_case
        uses: ASzc/change-string-case-action@v6
        with:
          string: ${{ matrix.image_name }}

      - name: Push To GHCR
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        id: push
        uses: redhat-actions/push-to-registry@v2
        env:
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          registry: ${{ steps.registry_case.outputs.lowercase }}
          image: ${{ steps.image_case.outputs.lowercase }}
          tags: ${{ steps.metadata.outputs.tags }}

      - name: Install Cosign
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign container image
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          IMAGE_FULL="${{ steps.registry_case.outputs.lowercase }}/${{ steps.image_case.outputs.lowercase }}"
          for tag in ${{ steps.metadata.outputs.tags }}; do
            cosign sign -y --key env://COSIGN_PRIVATE_KEY $IMAGE_FULL:$tag
          done
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}